name: test build

on:
  push:
    branches-ignore:
      - master

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Build
        run: docker build . -t ffmpeg-test

      - name: Run media tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test-media:/test-media:ro" \
            -v "${{ github.workspace }}/tests:/tests:ro" \
            ffmpeg-test bash /tests/run-media-tests.sh
